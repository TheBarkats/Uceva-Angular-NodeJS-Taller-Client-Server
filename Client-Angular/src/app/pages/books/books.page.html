<div class="container">
  <div class="row">
    <div class="col-12">
      <h1>📚 Libros</h1>
      <p class="text-muted">Gestión del catálogo de libros disponibles</p>
    </div>
  </div>

  <!-- Estados de carga y error -->
  <app-alert
    *ngIf="state === 'loading'"
    type="info"
    message="Cargando libros..."
  ></app-alert>

  <app-alert
    *ngIf="state === 'error'"
    type="danger"
    message="Error al cargar los libros. Por favor, intenta nuevamente."
  ></app-alert>

  <!-- Tabla de libros -->
  <div *ngIf="state === 'success'" class="row mt-4">
    <div class="col-12">
      <div class="table-responsive">
        <table class="table table-hover table-striped">
          <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>Título</th>
              <th>Autor</th>
              <th>Género</th>
              <th>Precio</th>
              <th>Páginas</th>
              <th>ISBN</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let book of books; let i = index">
              <td>{{ i + 1 }}</td>
              <td>{{ book.title }}</td>
              <td>{{ book.author }}</td>
              <td>{{ book.genre }}</td>
              <td>${{ book.price | number }}</td>
              <td>{{ book.pages }}</td>
              <td class="font-monospace">{{ book.isbn }}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <p class="text-muted mt-3">Total de libros: <strong>{{ books.length }}</strong></p>
    </div>
  </div>
</div>
